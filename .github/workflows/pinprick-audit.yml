name: pinprick audit

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches:
      - main

concurrency:
  group: "pinprick-audit-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run pinprick
        uses: starhaven-io/pinprick-action@a663b6d119c2e5f4ff239bfdf155f50143e67706 # v0.4.2
        with:
          # Fork pull requests cannot upload SARIF with the read-only token.
          advanced-security: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          fail-on-findings: true
